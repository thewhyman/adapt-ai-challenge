<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Distribution Engine — Adapt AI</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #08080a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
  }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial gradient for Knowledge Graph -->
    <radialGradient id="kgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b0dab"/>
      <stop offset="100%" stop-color="#0f0820"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="kgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="traverseGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowTealConfig" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
    <marker id="arrowPurpleDashed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowTealAdapter" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background frame -->
  <rect x="0" y="0" width="1200" height="680" fill="#111113" stroke="#14b8a6" stroke-width="1.5"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#14b8a6"/>

  <!-- Title -->
  <text x="600" y="30" fill="#14b8a6" font-size="13" font-weight="bold"
        letter-spacing="3" text-anchor="middle">DISTRIBUTION ENGINE</text>
  <text x="600" y="50" fill="#6b7280" font-size="10" letter-spacing="1.5" text-anchor="middle">DEFINE YOUR AUDIENCE ONCE. PUBLISH EVERYWHERE. AUTOMATICALLY.</text>

  <!-- ============================================ -->
  <!-- ROW 1: 3 CONFIG NODES                         -->
  <!-- ============================================ -->

  <!-- AudienceProfile -->
  <g>
    <rect x="260" y="75" width="220" height="120" rx="12"
          fill="#0c1a2e" stroke="#1d4ed8" stroke-width="2"/>
    <text x="370" y="100" fill="#93c5fd" font-size="11" font-weight="bold"
          text-anchor="middle" letter-spacing="1">AUDIENCE PROFILE</text>
    <text x="370" y="125" fill="#60a5fa" font-size="10" text-anchor="middle">Name · Role</text>
    <text x="370" y="143" fill="#60a5fa" font-size="10" text-anchor="middle">Complexity Threshold</text>
    <text x="370" y="161" fill="#60a5fa" font-size="10" text-anchor="middle">Domain Assumptions</text>
    <text x="370" y="184" fill="#60a5fa" font-size="8" font-weight="bold"
          text-anchor="middle" letter-spacing="1">DEFINED ONCE · REUSED FOREVER</text>
  </g>

  <!-- Voice Engine -->
  <g>
    <rect x="490" y="75" width="220" height="120" rx="12"
          fill="#1a0a2e" stroke="#7c3aed" stroke-width="2"/>
    <text x="600" y="100" fill="#c4b5fd" font-size="11" font-weight="bold"
          text-anchor="middle" letter-spacing="1">VOICE ENGINE  ✦</text>
    <text x="600" y="125" fill="#a78bfa" font-size="10" text-anchor="middle">Brand Tone · Register</text>
    <text x="600" y="143" fill="#a78bfa" font-size="10" text-anchor="middle">Vocabulary Rules</text>
    <text x="600" y="161" fill="#a78bfa" font-size="10" text-anchor="middle">Persona Calibration</text>
    <text x="600" y="184" fill="#c4b5fd" font-size="8" font-weight="bold"
          text-anchor="middle" letter-spacing="1">SHARED: ADAPT + DISTRIBUTION</text>
  </g>

  <!-- Output Format -->
  <g>
    <rect x="720" y="75" width="220" height="120" rx="12"
          fill="#0a1e1a" stroke="#0f766e" stroke-width="2"/>
    <text x="830" y="100" fill="#5eead4" font-size="11" font-weight="bold"
          text-anchor="middle" letter-spacing="1">OUTPUT FORMAT</text>
    <text x="830" y="125" fill="#2dd4bf" font-size="10" text-anchor="middle">Format · Structure</text>
    <text x="830" y="143" fill="#2dd4bf" font-size="10" text-anchor="middle">Length · Sections</text>
    <text x="830" y="161" fill="#2dd4bf" font-size="10" text-anchor="middle">Call-to-Action</text>
    <text x="830" y="184" fill="#2dd4bf" font-size="8" font-weight="bold"
          text-anchor="middle" letter-spacing="1">DEFINED ONCE · REUSED FOREVER</text>
  </g>

  <!-- Vertical down arrows from config nodes to Traverse top -->
  <line x1="370" y1="197" x2="370" y2="228"
        stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="600" y1="197" x2="600" y2="228"
        stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="830" y1="197" x2="830" y2="228"
        stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowTealConfig)"/>

  <!-- ============================================ -->
  <!-- ROW 2: KNOWLEDGE GRAPH + TRAVERSE ENGINE     -->
  <!-- ============================================ -->

  <!-- Knowledge Graph outer ring -->
  <circle cx="155" cy="285" r="96" fill="none" stroke="#4c1d95"
          stroke-width="1.5" opacity="0.3"/>

  <!-- Knowledge Graph main -->
  <circle cx="155" cy="285" r="88" fill="url(#kgGradient)"
          stroke="#7c3aed" stroke-width="2.5" filter="url(#kgGlow)"/>

  <text x="155" y="278" fill="#c4b5fd" font-size="14" font-weight="bold" text-anchor="middle">Knowledge</text>
  <text x="155" y="296" fill="#c4b5fd" font-size="14" font-weight="bold" text-anchor="middle">Graph</text>
  <text x="155" y="318" fill="#a78bfa" font-size="9" text-anchor="middle">Company Knowledge Base</text>
  <text x="155" y="340" fill="#6b7280" font-size="8" text-anchor="middle">← from Extraction Engine</text>

  <!-- Horizontal dashed arrow KG → Traverse -->
  <line x1="243" y1="285" x2="258" y2="285"
        stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4"
        marker-end="url(#arrowPurpleDashed)"/>

  <!-- Traverse Engine -->
  <rect x="260" y="225" width="840" height="120" rx="14"
        fill="#0a1a1a" stroke="#14b8a6" stroke-width="2.5" filter="url(#traverseGlow)"/>

  <text x="680" y="265" fill="#5eead4" font-size="14" font-weight="bold"
        text-anchor="middle" letter-spacing="2">CONTENT ENGINE</text>
  <text x="680" y="286" fill="#6b7280" font-size="10" text-anchor="middle">
    KnowledgeGraph × AudienceProfile × OutputFormat × Voice
  </text>
  <text x="680" y="303" fill="#0f766e" font-size="10" text-anchor="middle">
    filter by threshold · apply voice · structure output · flag gaps
  </text>
  <text x="680" y="320" fill="#374151" font-size="9" font-style="italic" text-anchor="middle">
    add new persona or format → zero re-ingestion
  </text>

  <!-- ============================================ -->
  <!-- ROW 3: PLATFORM ADAPTERS                     -->
  <!-- ============================================ -->

  <!-- Vertical down arrows Traverse → each adapter -->
  <line x1="330" y1="345" x2="330" y2="358"
        stroke="#14b8a6" stroke-width="1.8" marker-end="url(#arrowTealAdapter)"/>
  <line x1="470" y1="345" x2="470" y2="358"
        stroke="#14b8a6" stroke-width="1.8" marker-end="url(#arrowTealAdapter)"/>
  <line x1="610" y1="345" x2="610" y2="358"
        stroke="#14b8a6" stroke-width="1.8" marker-end="url(#arrowTealAdapter)"/>
  <line x1="750" y1="345" x2="750" y2="358"
        stroke="#14b8a6" stroke-width="1.8" marker-end="url(#arrowTealAdapter)"/>
  <line x1="890" y1="345" x2="890" y2="358"
        stroke="#14b8a6" stroke-width="1.8" marker-end="url(#arrowTealAdapter)"/>
  <line x1="1030" y1="345" x2="1030" y2="358"
        stroke="#14b8a6" stroke-width="1.8" marker-end="url(#arrowTealAdapter)"/>

  <!-- Adapter 1: LinkedIn -->
  <g>
    <rect x="265" y="360" width="130" height="110" rx="10"
          fill="#0a1525" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="330" y="385" fill="#93c5fd" font-size="12" font-weight="bold" text-anchor="middle">LinkedIn</text>
    <text x="330" y="412" fill="#6b7280" font-size="9" text-anchor="middle">hook + thread</text>
    <text x="330" y="430" fill="#6b7280" font-size="9" text-anchor="middle">char limit</text>
    <text x="330" y="448" fill="#6b7280" font-size="9" text-anchor="middle">post + carousel</text>
  </g>

  <!-- Adapter 2: X / Twitter -->
  <g>
    <rect x="405" y="360" width="130" height="110" rx="10"
          fill="#0e0e14" stroke="#374151" stroke-width="1.5"/>
    <text x="470" y="385" fill="#9ca3af" font-size="12" font-weight="bold" text-anchor="middle">X / Twitter</text>
    <text x="470" y="412" fill="#6b7280" font-size="9" text-anchor="middle">280-char thread</text>
    <text x="470" y="430" fill="#6b7280" font-size="9" text-anchor="middle">hook-first</text>
    <text x="470" y="448" fill="#6b7280" font-size="9" text-anchor="middle">thread adapter</text>
  </g>

  <!-- Adapter 3: Email -->
  <g>
    <rect x="545" y="360" width="130" height="110" rx="10"
          fill="#0f1a0a" stroke="#15803d" stroke-width="1.5"/>
    <text x="610" y="385" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">Email</text>
    <text x="610" y="412" fill="#6b7280" font-size="9" text-anchor="middle">subject + preview</text>
    <text x="610" y="430" fill="#6b7280" font-size="9" text-anchor="middle">HTML output</text>
    <text x="610" y="448" fill="#6b7280" font-size="9" text-anchor="middle">CTA block</text>
  </g>

  <!-- Adapter 4: Blog -->
  <g>
    <rect x="685" y="360" width="130" height="110" rx="10"
          fill="#1a0a00" stroke="#92400e" stroke-width="1.5"/>
    <text x="750" y="385" fill="#fb923c" font-size="12" font-weight="bold" text-anchor="middle">Blog</text>
    <text x="750" y="412" fill="#6b7280" font-size="9" text-anchor="middle">SEO + H2s</text>
    <text x="750" y="430" fill="#6b7280" font-size="9" text-anchor="middle">full markdown</text>
    <text x="750" y="448" fill="#6b7280" font-size="9" text-anchor="middle">Substack / Medium</text>
  </g>

  <!-- Adapter 5: Slack / Teams -->
  <g>
    <rect x="825" y="360" width="130" height="110" rx="10"
          fill="#0a0f1e" stroke="#4338ca" stroke-width="1.5"/>
    <text x="890" y="385" fill="#a5b4fc" font-size="12" font-weight="bold" text-anchor="middle">Slack / Teams</text>
    <text x="890" y="412" fill="#6b7280" font-size="9" text-anchor="middle">internal digest</text>
    <text x="890" y="430" fill="#6b7280" font-size="9" text-anchor="middle">block kit</text>
    <text x="890" y="448" fill="#6b7280" font-size="9" text-anchor="middle">channel-aware</text>
  </g>

  <!-- Adapter 6: API / Custom -->
  <g>
    <rect x="965" y="360" width="130" height="110" rx="10"
          fill="#0a1a12" stroke="#065f46" stroke-width="1.5"/>
    <text x="1030" y="385" fill="#6ee7b7" font-size="12" font-weight="bold" text-anchor="middle">API / Custom</text>
    <text x="1030" y="412" fill="#6b7280" font-size="9" text-anchor="middle">webhook · JSON</text>
    <text x="1030" y="430" fill="#6b7280" font-size="9" text-anchor="middle">any downstream</text>
    <text x="1030" y="448" fill="#6b7280" font-size="9" text-anchor="middle">extensible</text>
  </g>

  <!-- ============================================ -->
  <!-- ROW 4: ARM EXAMPLE STRIP                     -->
  <!-- ============================================ -->

  <rect x="40" y="488" width="1120" height="80" rx="10"
        fill="#0d0d10" stroke="#1f2937" stroke-width="1"/>

  <text x="600" y="512" fill="#9ca3af" font-size="9" font-weight="bold"
        letter-spacing="3" text-anchor="middle">EXAMPLE · ARM MALI GPU LAUNCH</text>
  <text x="600" y="532" fill="#6b7280" font-size="10" text-anchor="middle">Datacenter CTO (depth 5)  →  Whitepaper + API adapter</text>
  <text x="600" y="550" fill="#6b7280" font-size="10" text-anchor="middle">Developer (depth 3)  →  LinkedIn Thread adapter</text>
  <text x="600" y="566" fill="#10b981" font-size="11" font-style="italic" font-weight="bold"
        text-anchor="middle">Same Knowledge Graph. Three passes. Zero re-ingestion. Three campaigns.</text>

  <!-- Footer -->
  <text x="600" y="640" fill="#4b5563" font-size="9" letter-spacing="2"
        text-anchor="middle">DISTRIBUTION ENGINE · ADAPT AI · Step 3 of 3</text>
</svg>
</body>
</html>
